# 服务器端口（浏览器访问用）
server:
  port: 8080

spring:
  application:
    name: EasyLedger
  # 数据库核心配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver  # MySQL8.0+固定写法，不用改
    # 3306是端口，easy_ledger是数据库名（和Workbench创建的一致）
    url: jdbc:mysql://localhost:3306/easy_ledger?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    # MySQL用户名（默认root）
    username: root
    # 优先读取环境变量 DB_PASSWORD；本地未设置时使用默认值
    password: 11223344a
  # 前端模板配置
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

# MyBatis-Plus适配JDK24的核心配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.bbww.easyledger.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    banner: false
