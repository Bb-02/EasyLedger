<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EasyLedger Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}" href="/css/theme.css">
    <link rel="icon" type="image/png" th:href="@{/images/EasyLedger.png}" href="/images/EasyLedger.png">
    <script>
        (function () {
            var theme = localStorage.getItem("easyledger-theme");
            if (theme === "dark") {
                document.documentElement.setAttribute("data-theme", "dark");
            } else {
                document.documentElement.removeAttribute("data-theme");
            }
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background: var(--bg);
        }
        .container {
            max-width: 1200px;
            margin: 24px auto;
            padding: 0 16px 24px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
        }
        .title-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .app-logo {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.18);
        }
        .title {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
        }
        .subtitle {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 13px;
        }
        .actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .actions .action-link {
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 14px;
            display: inline-block;
            border: 1px solid transparent;
        }
        .actions .action-primary { background: var(--primary); color: #fff; }
        .actions .action-secondary { background: var(--action-bg); color: var(--action-text); border-color: var(--action-border); }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .filters {
            padding: 14px;
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }
        .filters label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .filters select,
        .filters input {
            width: 100%;
            padding: 9px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text);
        }
        .filters .period-control {
            grid-column: span 2;
        }
        .period-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .segmented {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--toggle-bg);
            padding: 4px;
            border-radius: 999px;
        }
        .seg-btn {
            border: 1px solid transparent;
            background: transparent;
            color: var(--muted);
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            cursor: pointer;
        }
        .seg-btn.active {
            background: var(--toggle-active-bg);
            color: var(--text);
            border-color: var(--border);
            box-shadow: 0 2px 6px rgba(15, 23, 42, 0.12);
        }
        .period-nav {
            display: inline-flex;
            gap: 6px;
        }
        .nav-btn {
            border: 1px solid var(--border);
            background: var(--action-bg);
            color: var(--action-text);
            padding: 6px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-row {
            display: flex;
            gap: 8px;
            align-items: end;
        }
        .btn {
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            display: inline-block;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-light { background: var(--action-bg); color: var(--action-text); border: 1px solid var(--action-border); }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat {
            padding: 14px;
        }
        .stat .k { color: var(--muted); font-size: 13px; }
        .stat .v { margin-top: 6px; font-size: 28px; font-weight: 720; }
        .income { color: var(--success); }
        .expense { color: var(--danger); }

        .charts {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .chart-box {
            padding: 12px;
            position: relative;
        }
        .chart-title { margin: 0 0 8px; font-size: 15px; }
        .chart { width: 100%; height: 340px; }
        .chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
        }
        .toggle-group {
            display: flex;
            gap: 6px;
            background: var(--toggle-bg);
            padding: 4px;
            border-radius: 999px;
        }
        .toggle-btn {
            border: none;
            background: transparent;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            color: var(--muted);
            cursor: pointer;
        }
        .toggle-btn.active {
            background: var(--toggle-active-bg);
            color: var(--text);
            box-shadow: 0 2px 6px rgba(15, 23, 42, 0.12);
            border: 1px solid var(--border);
        }

        .table-wrap {
            padding: 12px;
            overflow: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--table-bg);
        }
        th, td {
            border-bottom: 1px solid var(--border);
            padding: 10px 8px;
            text-align: left;
            font-size: 14px;
            white-space: nowrap;
        }
        th { background: var(--table-head-bg); }

        .chart-empty {
            position: absolute;
            inset: 64px 16px 16px;
            border: none;
            border-radius: 0;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-align: center;
            color: var(--muted);
            padding: 0 12px;
        }
        .chart-empty[hidden] { display: none; }
        .chart-empty svg {
            width: 140px;
            height: 105px;
        }
        .chart-empty .empty-title {
            font-size: 14px;
            color: var(--text);
            font-weight: 600;
        }
        .chart-empty .empty-sub {
            font-size: 12px;
        }

        @media (max-width: 960px) {
            .filters { grid-template-columns: 1fr 1fr; }
            .stats { grid-template-columns: 1fr; }
            .charts { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <div class="title-wrap">
                <img class="app-logo" th:src="@{/images/EasyLedger.png}" src="/images/EasyLedger.png" alt="EasyLedger">
                <h1 class="title">EasyLedger</h1>
            </div>
            <p class="subtitle">Dashboard v1 - 2026-03-12</p>
        </div>
        <div class="actions">
            <a class="action-link action-secondary" th:href="@{/settings}">设置</a>
            <a class="action-link action-primary" th:href="@{/transactions/new}">+ 新增记账</a>
        </div>
    </div>

    <form class="card filters" th:action="@{/transactions}" method="get">
        <div>
            <label>类型</label>
            <select name="type">
                <option value="" th:selected="${type == null or type == ''}">全部</option>
                <option value="INCOME" th:selected="${type == 'INCOME'}">收入</option>
                <option value="EXPENSE" th:selected="${type == 'EXPENSE'}">支出</option>
            </select>
        </div>
        <div>
            <label>开始日期</label>
            <input type="date" name="startDate" th:value="${startDate}">
        </div>
        <div>
            <label>结束日期</label>
            <input type="date" name="endDate" th:value="${endDate}">
        </div>
        <div class="period-control">
            <label>周期</label>
            <div class="period-row">
                <div class="segmented" id="periodButtons">
                    <button type="button" class="seg-btn" data-period="day">日</button>
                    <button type="button" class="seg-btn" data-period="week">周</button>
                    <button type="button" class="seg-btn" data-period="month">月</button>
                    <button type="button" class="seg-btn" data-period="year">年</button>
                </div>
                <div class="period-nav" id="periodNav">
                    <button type="button" class="nav-btn" data-shift="-1">&lt;</button>
                    <button type="button" class="nav-btn" data-shift="1">&gt;</button>
                </div>
            </div>
            <input type="hidden" name="period" id="periodInput" th:value="${period}">
        </div>
        <div class="btn-row">
            <a class="btn btn-light" th:href="@{/transactions}">重置</a>
            <a class="btn btn-light" th:href="@{/transactions/new}">去新增一笔</a>
        </div>
    </form>

    <div class="stats">
        <div class="card stat">
            <div class="k">总收入</div>
            <div id="totalIncome" class="v income">0</div>
        </div>
        <div class="card stat">
            <div class="k">总支出</div>
            <div id="totalExpense" class="v expense">0</div>
        </div>
        <div class="card stat">
            <div class="k">净额</div>
            <div id="netAmount" class="v">0</div>
        </div>
    </div>

    <div class="charts">
        <div class="card chart-box">
            <div class="chart-header">
                <h3 class="chart-title" id="periodTitle">按天金额趋势</h3>
                <div class="toggle-group" id="periodToggle">
                    <button type="button" class="toggle-btn active" data-period="day">天</button>
                    <button type="button" class="toggle-btn" data-period="week">周</button>
                    <button type="button" class="toggle-btn" data-period="month">月</button>
                    <button type="button" class="toggle-btn" data-period="year">年</button>
                </div>
            </div>
            <div id="dailyBarChart" class="chart"></div>
            <div class="chart-empty" id="emptyState1" hidden>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" aria-hidden="true">
                    <defs>
                        <linearGradient id="emptyGrad" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0" stop-color="#c7d2fe"/>
                            <stop offset="1" stop-color="#bae6fd"/>
                        </linearGradient>
                    </defs>
                    <rect x="16" y="16" width="208" height="128" rx="18" fill="url(#emptyGrad)" opacity="0.25"/>
                    <rect x="36" y="44" width="120" height="72" rx="12" fill="#ffffff" opacity="0.8"/>
                    <path d="M46 62h100M46 82h76M46 102h56" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
                    <circle cx="186" cy="62" r="18" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="4"/>
                    <path d="M174 62h24M186 50v24" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/>
                </svg>
                <div class="empty-title">当前日期范围暂无数据</div>
                <div class="empty-sub">请调整筛选条件或新增记账</div>
            </div>
        </div>
        <div class="card chart-box">
            <div class="chart-header">
                <h3 class="chart-title">分类占比</h3>
                <div class="toggle-group" id="pieToggle">
                    <button type="button" class="toggle-btn active" data-type="EXPENSE">支出</button>
                    <button type="button" class="toggle-btn" data-type="INCOME">收入</button>
                </div>
            </div>
            <div id="categoryPieChart" class="chart"></div>
            <div class="chart-empty" id="emptyState2" hidden>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" aria-hidden="true">
                    <defs>
                        <linearGradient id="emptyGradPie" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0" stop-color="#c7d2fe"/>
                            <stop offset="1" stop-color="#bae6fd"/>
                        </linearGradient>
                    </defs>
                    <rect x="16" y="16" width="208" height="128" rx="18" fill="url(#emptyGradPie)" opacity="0.25"/>
                    <circle cx="90" cy="88" r="36" fill="#ffffff" opacity="0.85"/>
                    <path d="M90 52a36 36 0 0 1 34 24l-34 12z" fill="#bfdbfe"/>
                    <rect x="140" y="64" width="60" height="12" rx="6" fill="#e2e8f0"/>
                    <rect x="140" y="86" width="48" height="12" rx="6" fill="#e2e8f0"/>
                    <rect x="140" y="108" width="36" height="12" rx="6" fill="#e2e8f0"/>
                </svg>
                <div class="empty-title">当前日期范围暂无数据</div>
                <div class="empty-sub">请调整筛选条件或新增记账</div>
            </div>
        </div>
    </div>

    <div class="card table-wrap">
        <table>
            <thead>
            <tr>
                <th>状态</th>
                <th>说明</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td id="statusCell">加载中</td>
                <td id="statusMsg">正在获取统计数据...</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="card table-wrap" style="margin-top: 16px;">
        <div class="chart-header">
            <h3 class="chart-title">最近流水</h3>
            <a class="btn btn-light" th:href="@{/transactions/records}">更多记录</a>
        </div>
        <table>
            <thead>
            <tr>
                <th>日期</th>
                <th>类型</th>
                <th>分类</th>
                <th>金额</th>
                <th>备注</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${recentTransactions == null or #lists.isEmpty(recentTransactions)}">
                <td colspan="6">暂无流水，先新增一笔吧。</td>
            </tr>
            <tr th:each="t : ${recentTransactions}">
                <td th:text="${t.txnDate}">2026-03-13</td>
                <td th:text="${t.type == 'INCOME' ? '收入' : '支出'}">支出</td>
                <td th:text="${categoryNameMap[t.categoryId] ?: '未分类'}">餐饮</td>
                <td th:text="${t.amount}">0.00</td>
                <td th:text="${t.note}">-</td>
                <td>
                    <a class="btn-chip btn-chip--edit" th:href="@{'/transactions/' + ${t.id} + '/edit'}">编辑</a>
                    <form th:action="@{'/transactions/' + ${t.id} + '/delete'}" method="post" style="display:inline; margin-left: 8px;">
                        <button type="submit" class="btn-chip btn-chip--delete" onclick="return confirm('确认删除这条记录吗？');">删除</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script th:inline="javascript">
    (function () {
        const summaryBaseUrl = /*[[@{/transactions/stats/summary}]]*/ "/transactions/stats/summary";
        const params = new URLSearchParams(window.location.search);
        const query = new URLSearchParams();
        ["type", "startDate", "endDate", "period", "chartPeriod"].forEach(function (k) {
            const v = params.get(k);
            if (v) query.set(k, v);
        });
        const periodInput = document.getElementById("periodInput");
        const startInput = document.querySelector("input[name='startDate']");
        const endInput = document.querySelector("input[name='endDate']");
        const typeSelect = document.querySelector("select[name='type']");
        const filterForm = document.querySelector("form.filters");
        const initialPeriod = params.get("chartPeriod") || "day";
        const filterPeriod = (periodInput && periodInput.value) || "month";
        const periodLabels = {
            day: "按天金额趋势",
            week: "按周金额趋势",
            month: "按月金额趋势",
            year: "按年金额趋势"
        };
        const periodTitle = document.getElementById("periodTitle");
        const periodToggle = document.getElementById("periodToggle");
        const periodButtons = document.getElementById("periodButtons");
        const periodNav = document.getElementById("periodNav");
        const emptyStateBar = document.getElementById("emptyState1");
        const emptyStatePie = document.getElementById("emptyState2");

        function toggleEmptyState(el, show) {
            if (!el) return;
            el.hidden = !show;
        }

        function buildUrl(period) {
            const nextQuery = new URLSearchParams();
            ["type", "startDate", "endDate"].forEach(function (k) {
                const v = params.get(k);
                if (v) nextQuery.set(k, v);
            });
            nextQuery.set("period", period || "day");
            return summaryBaseUrl + "?" + nextQuery.toString();
        }

        function updateFilterUi(period) {
            const title = periodLabels[period] || periodLabels.day;
            if (periodInput) periodInput.value = period;
            if (periodButtons) {
                const buttons = periodButtons.querySelectorAll(".seg-btn");
                buttons.forEach(function (btn) {
                    btn.classList.toggle("active", btn.getAttribute("data-period") === period);
                });
            }
        }

        function updateChartUi(period) {
            const title = periodLabels[period] || periodLabels.day;
            if (periodTitle) periodTitle.textContent = title;
            if (periodToggle) {
                const buttons = periodToggle.querySelectorAll(".toggle-btn");
                buttons.forEach(function (btn) {
                    btn.classList.toggle("active", btn.getAttribute("data-period") === period);
                });
            }
        }

        function pad2(num) {
            return String(num).padStart(2, "0");
        }

        function formatDate(date) {
            return date.getFullYear() + "-" + pad2(date.getMonth() + 1) + "-" + pad2(date.getDate());
        }

        function parseDate(value) {
            if (!value) return null;
            const parsed = new Date(value + "T00:00:00");
            return Number.isNaN(parsed.getTime()) ? null : parsed;
        }

        function addDays(date, days) {
            const next = new Date(date);
            next.setDate(next.getDate() + days);
            return next;
        }

        function startOfWeek(date) {
            const next = new Date(date);
            const day = next.getDay();
            const diff = (day + 6) % 7;
            next.setDate(next.getDate() - diff);
            return next;
        }

        function rangeForPeriod(period, anchor) {
            const base = anchor ? new Date(anchor) : new Date();
            if (period === "week") {
                const start = startOfWeek(base);
                return { start: start, end: addDays(start, 6) };
            }
            if (period === "month") {
                const start = new Date(base.getFullYear(), base.getMonth(), 1);
                const end = new Date(base.getFullYear(), base.getMonth() + 1, 0);
                return { start: start, end: end };
            }
            if (period === "year") {
                const start = new Date(base.getFullYear(), 0, 1);
                const end = new Date(base.getFullYear(), 11, 31);
                return { start: start, end: end };
            }
            return { start: base, end: base };
        }

        function applyRange(period, anchor) {
            const range = rangeForPeriod(period, anchor);
            if (startInput) startInput.value = formatDate(range.start);
            if (endInput) endInput.value = formatDate(range.end);
        }

        function submitFilters() {
            if (!filterForm) return;
            if (periodInput && !periodInput.value) {
                periodInput.value = filterPeriod || "month";
            }
            filterForm.submit();
        }

        function currentPeriod() {
            return (periodInput && periodInput.value) || "month";
        }

        function shiftRange(period, start, end, direction) {
            if (period === "week") {
                return { start: addDays(start, 7 * direction), end: addDays(end, 7 * direction) };
            }
            if (period === "month") {
                const nextStart = new Date(start.getFullYear(), start.getMonth() + direction, 1);
                const nextEnd = new Date(nextStart.getFullYear(), nextStart.getMonth() + 1, 0);
                return { start: nextStart, end: nextEnd };
            }
            if (period === "year") {
                const year = start.getFullYear() + direction;
                return { start: new Date(year, 0, 1), end: new Date(year, 11, 31) };
            }
            return { start: addDays(start, direction), end: addDays(end, direction) };
        }

        function setStatus(status, msg) {
            document.getElementById("statusCell").textContent = status;
            document.getElementById("statusMsg").textContent = msg;
        }

        function fmt(v) {
            return Number(v || 0).toLocaleString("zh-CN", { maximumFractionDigits: 2 });
        }

        function getThemeColors() {
            const styles = getComputedStyle(document.documentElement);
            return {
                text: styles.getPropertyValue("--text").trim() || "#1f2937",
                muted: styles.getPropertyValue("--muted").trim() || "#6b7280",
                border: styles.getPropertyValue("--border").trim() || "#e5e7eb",
                success: styles.getPropertyValue("--success").trim() || "#16a34a",
                danger: styles.getPropertyValue("--danger").trim() || "#dc2626"
            };
        }

        function render(payload, period) {
            updateChartUi(period);
            const income = Number(payload.totalIncome || 0);
            const expense = Number(payload.totalExpense || 0);
            const net = income - expense;

            document.getElementById("totalIncome").textContent = fmt(income);
            document.getElementById("totalExpense").textContent = fmt(expense);
            document.getElementById("netAmount").textContent = fmt(net);

            const periodIncome = payload.periodIncomeTotals || [];
            const periodExpense = payload.periodExpenseTotals || [];
            const bucketMap = {};
            const labels = [];

            function ensureLabel(label) {
                if (!bucketMap[label]) {
                    bucketMap[label] = { income: 0, expense: 0 };
                    labels.push(label);
                }
            }

            periodIncome.forEach(function (item) {
                const label = item.label || "未知日期";
                ensureLabel(label);
                bucketMap[label].income = Number(item.amount || 0);
            });
            periodExpense.forEach(function (item) {
                const label = item.label || "未知日期";
                ensureLabel(label);
                bucketMap[label].expense = Number(item.amount || 0);
            });

            const allBuckets = labels.map(function (label) {
                return {
                    label: label,
                    income: bucketMap[label].income || 0,
                    expense: bucketMap[label].expense || 0
                };
            });
            const nonZeroBuckets = allBuckets.filter(function (b) {
                return b.income > 0 || b.expense > 0;
            });
            const bucketSource = nonZeroBuckets.length ? nonZeroBuckets : allBuckets;
            const recentBuckets = bucketSource.slice(-7);
            const limitedLabels = recentBuckets.map(function (b) { return b.label; });
            const incomeSeries = recentBuckets.map(function (b) { return b.income; });
            const expenseSeries = recentBuckets.map(function (b) { return b.expense; });
            const hasPeriodData = recentBuckets.some(function (b) {
                return (b.income || 0) > 0 || (b.expense || 0) > 0;
            });

            toggleEmptyState(emptyStateBar, !hasPeriodData);

            const categoryIncome = payload.categoryTotalsIncome || [];
            const categoryExpense = payload.categoryTotalsExpense || [];
            const colors = getThemeColors();

            const barChart = echarts.init(document.getElementById("dailyBarChart"));
            barChart.setOption({
                tooltip: { trigger: "axis" },
                legend: { data: ["收入", "支出"], textStyle: { color: colors.muted } },
                grid: { left: 30, right: 16, bottom: 24, top: 32, containLabel: true },
                xAxis: {
                    type: "category",
                    data: limitedLabels,
                    axisLabel: { color: colors.muted },
                    axisLine: { lineStyle: { color: colors.border } }
                },
                yAxis: {
                    type: "value",
                    axisLabel: { color: colors.muted },
                    axisLine: { lineStyle: { color: colors.border } },
                    splitLine: { lineStyle: { color: colors.border } }
                },
                series: [
                    {
                        name: "收入",
                        type: "bar",
                        data: incomeSeries,
                        barMaxWidth: 24,
                        itemStyle: { color: colors.success }
                    },
                    {
                        name: "支出",
                        type: "bar",
                        data: expenseSeries,
                        barMaxWidth: 24,
                        itemStyle: { color: colors.danger }
                    }
                ]
            });

            const pieChart = echarts.init(document.getElementById("categoryPieChart"));
            const pieToggle = document.getElementById("pieToggle");
            const initialType = params.get("type") === "INCOME" ? "INCOME" : "EXPENSE";

            function buildPieData(type) {
                const source = type === "INCOME" ? categoryIncome : categoryExpense;
                return source.map(function (i) {
                    return { name: i.categoryName || "未分类", value: i.amount || 0 };
                });
            }

            function renderPie(type) {
                const data = buildPieData(type);
                const hasPieData = data.some(function (item) {
                    return Number(item.value || 0) > 0;
                });
                toggleEmptyState(emptyStatePie, !hasPieData);
                if (!hasPieData) {
                    pieChart.clear();
                    return;
                }
                pieChart.setOption({
                    tooltip: { trigger: "item" },
                    legend: { bottom: 0, textStyle: { color: colors.muted } },
                    series: [{
                        type: "pie",
                        radius: ["35%", "65%"],
                        avoidLabelOverlap: true,
                        label: { color: colors.text },
                        data: data
                    }]
                });
            }

            if (pieToggle) {
                const buttons = pieToggle.querySelectorAll(".toggle-btn");
                buttons.forEach(function (btn) {
                    const isActive = btn.getAttribute("data-type") === initialType;
                    btn.classList.toggle("active", isActive);
                });
                pieToggle.addEventListener("click", function (event) {
                    const target = event.target;
                    if (!target || !target.classList.contains("toggle-btn")) return;
                    buttons.forEach(function (btn) {
                        btn.classList.toggle("active", btn === target);
                    });
                    renderPie(target.getAttribute("data-type"));
                });
            }

            renderPie(initialType);

            let resizeTimer = null;
            window.addEventListener("resize", function () {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function () {
                    barChart.resize();
                    pieChart.resize();
                }, 120);
            });

            setStatus("成功", "统计数据已加载，图表渲染完成。");
        }

        function fetchSummary(period) {
            const url = buildUrl(period);
            fetch(url)
                .then(function (resp) {
                    if (!resp.ok) throw new Error("HTTP " + resp.status);
                    return resp.json();
                })
                .then(function (payload) {
                    render(payload, period || "day");
                })
                .catch(function (err) {
                    setStatus("失败", "统计接口调用失败: " + err.message);
                });
        }

        updateFilterUi(filterPeriod);

        if (startInput && endInput) {
            if (!startInput.value || !endInput.value) {
                applyRange(filterPeriod, new Date());
            }
        }

        if (periodButtons) {
            periodButtons.addEventListener("click", function (event) {
                const target = event.target;
                if (!target || !target.classList.contains("seg-btn")) return;
                const period = target.getAttribute("data-period") || "day";
                updateFilterUi(period);
                const anchor = parseDate(startInput && startInput.value)
                    || parseDate(endInput && endInput.value)
                    || new Date();
                applyRange(period, anchor);
                submitFilters();
            });
        }

        if (periodNav) {
            periodNav.addEventListener("click", function (event) {
                const target = event.target;
                if (!target || !target.classList.contains("nav-btn")) return;
                const direction = Number(target.getAttribute("data-shift") || 0);
                if (!direction) return;
                const period = currentPeriod();
                let start = parseDate(startInput && startInput.value);
                let end = parseDate(endInput && endInput.value);
                if (!start || !end) {
                    applyRange(period, new Date());
                    start = parseDate(startInput && startInput.value);
                    end = parseDate(endInput && endInput.value);
                }
                if (!start || !end) return;
                const shifted = shiftRange(period, start, end, direction);
                if (startInput) startInput.value = formatDate(shifted.start);
                if (endInput) endInput.value = formatDate(shifted.end);
                submitFilters();
            });
        }

        if (typeSelect) {
            typeSelect.addEventListener("change", function () {
                submitFilters();
            });
        }

        if (startInput) {
            startInput.addEventListener("change", function () {
                submitFilters();
            });
        }

        if (endInput) {
            endInput.addEventListener("change", function () {
                submitFilters();
            });
        }

        if (!window.echarts) {
            setStatus("失败", "ECharts CDN 加载失败，请检查网络连接。");
            return;
        }

        if (periodToggle) {
            periodToggle.addEventListener("click", function (event) {
                const target = event.target;
                if (!target || !target.classList.contains("toggle-btn")) return;
                const period = target.getAttribute("data-period") || "day";
                params.set("chartPeriod", period);
                const queryString = params.toString();
                const nextUrl = queryString ? window.location.pathname + "?" + queryString : window.location.pathname;
                window.history.replaceState(null, "", nextUrl);
                fetchSummary(period);
            });
        }

        fetchSummary(initialPeriod);
    })();
</script>
</body>
</html>
