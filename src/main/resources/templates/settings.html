<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>设置 - EasyLedger</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}" href="/css/theme.css">
    <link rel="icon" type="image/png" th:href="@{/images/EasyLedger.png}" href="/images/EasyLedger.png">
    <script>
        (function () {
            var theme = localStorage.getItem("easyledger-theme");
            if (theme === "dark") {
                document.documentElement.setAttribute("data-theme", "dark");
            } else {
                document.documentElement.removeAttribute("data-theme");
            }
        })();
    </script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background: var(--bg);
        }
        .container {
            max-width: 900px;
            margin: 24px auto;
            padding: 0 16px 24px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .title-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .app-logo {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.18);
        }
        .title {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
        }
        .subtitle {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 13px;
        }
        .actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .actions .action-link {
            text-decoration: none;
            background: var(--action-bg);
            color: var(--action-text);
            padding: 9px 12px;
            border-radius: 10px;
            font-size: 13px;
            display: inline-block;
            border: 1px solid var(--action-border);
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            margin-bottom: 14px;
        }
        .section-title {
            margin: 0 0 10px;
            font-size: 15px;
            font-weight: 600;
        }
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .setting-row.is-toggle {
            cursor: pointer;
        }
        .setting-action {
            padding: 4px 10px;
            border-radius: 999px;
            background: var(--action-bg);
            color: var(--action-text);
            border: 1px solid var(--action-border);
            font-size: 12px;
        }
        .expand-panel {
            display: none;
            padding: 10px 0 4px;
        }
        .expand-panel.is-open {
            display: block;
        }
        .theme-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .theme-card {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card);
            cursor: pointer;
            min-width: 180px;
        }
        .theme-card input {
            margin-left: auto;
        }
        .theme-preview {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }
        .theme-preview.day {
            background: #f8fafc;
            border-color: #e5e7eb;
        }
        .theme-preview.dark {
            background: #0d1117;
            border-color: #30363d;
        }
        .note {
            color: var(--muted);
            font-size: 12px;
            margin: 0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <div class="title-wrap">
                <img class="app-logo" th:src="@{/images/EasyLedger.png}" src="/images/EasyLedger.png" alt="EasyLedger">
                <h1 class="title">设置</h1>
            </div>
            <p class="subtitle">功能开关与个性化配置的入口</p>
        </div>
        <div class="actions">
            <a class="action-link" th:href="@{/transactions}">返回仪表盘</a>
        </div>
    </div>

    <div class="card">
        <h2 class="section-title">功能开关（预留）</h2>
        <div class="setting-row is-toggle" id="themeToggleRow" role="button" tabindex="0" aria-expanded="false" aria-controls="themePanel">
            <div class="setting-info">
                <div class="setting-name">主题模式</div>
                <div class="setting-desc">支持浅色/暗夜模式切换</div>
            </div>
            <span class="setting-action" id="themeToggleAction">展开</span>
        </div>
        <div class="expand-panel" id="themePanel">
            <div class="theme-options">
                <label class="theme-card" for="themeLight">
                    <span class="theme-preview day"></span>
                    <span>白天</span>
                    <input type="radio" name="themeMode" value="light" id="themeLight">
                </label>
                <label class="theme-card" for="themeDark">
                    <span class="theme-preview dark"></span>
                    <span>暗夜</span>
                    <input type="radio" name="themeMode" value="dark" id="themeDark">
                </label>
            </div>
            <p class="note" style="margin-top: 8px;">切换后会记住你的选择。</p>
        </div>
        <div class="setting-row">
            <div class="setting-info">
                <div class="setting-name">仪表盘图表开关</div>
                <div class="setting-desc">控制首页图表是否显示</div>
            </div>
            <input type="checkbox" disabled>
        </div>
        <div class="setting-row">
            <div class="setting-info">
                <div class="setting-name">默认统计周期</div>
                <div class="setting-desc">按天/周/月/年选择默认展示</div>
            </div>
            <input type="checkbox" disabled>
        </div>
    </div>

    <div class="card">
        <h2 class="section-title">说明</h2>
        <p class="note">这些选项将用于后续的个性化与偏好设置，当前仅预留入口。</p>
    </div>
</div>

<script>
    (function () {
        var themeKey = "easyledger-theme";
        var doc = document.documentElement;
        var row = document.getElementById("themeToggleRow");
        var panel = document.getElementById("themePanel");
        var action = document.getElementById("themeToggleAction");
        var lightRadio = document.getElementById("themeLight");
        var darkRadio = document.getElementById("themeDark");

        function applyTheme(next) {
            if (next === "dark") {
                doc.setAttribute("data-theme", "dark");
            } else {
                doc.removeAttribute("data-theme");
            }
            localStorage.setItem(themeKey, next);
        }

        function setPanel(open) {
            if (!panel || !row || !action) return;
            panel.classList.toggle("is-open", open);
            row.setAttribute("aria-expanded", open ? "true" : "false");
            action.textContent = open ? "收起" : "展开";
        }

        var storedTheme = localStorage.getItem(themeKey) || "light";
        if (darkRadio && lightRadio) {
            if (storedTheme === "dark") {
                darkRadio.checked = true;
            } else {
                lightRadio.checked = true;
            }
        }
        applyTheme(storedTheme === "dark" ? "dark" : "light");

        if (row && panel) {
            setPanel(false);
            row.addEventListener("click", function (event) {
                if (event.target && event.target.tagName === "INPUT") return;
                setPanel(!panel.classList.contains("is-open"));
            });
            row.addEventListener("keydown", function (event) {
                if (event.key === "Enter" || event.key === " ") {
                    event.preventDefault();
                    setPanel(!panel.classList.contains("is-open"));
                }
            });
        }

        if (lightRadio) {
            lightRadio.addEventListener("change", function () {
                if (lightRadio.checked) applyTheme("light");
            });
        }
        if (darkRadio) {
            darkRadio.addEventListener("change", function () {
                if (darkRadio.checked) applyTheme("dark");
            });
        }
    })();
</script>
</body>
</html>
