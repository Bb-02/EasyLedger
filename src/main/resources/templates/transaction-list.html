<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>流水列表 - EasyLedger</title>
</head>
<body>
<h1>流水列表</h1>

<p><a th:href="@{/transactions/new}">+ 新增记账</a></p>

<form th:action="@{/transactions}" method="get" style="margin-bottom: 12px;">
    <label>类型：</label>
    <select name="type">
        <option value="" th:selected="${type == null or type == ''}">全部</option>
        <option value="INCOME" th:selected="${type == 'INCOME'}">收入</option>
        <option value="EXPENSE" th:selected="${type == 'EXPENSE'}">支出</option>
    </select>

    <label>开始日期：</label>
    <input type="date" name="startDate" th:value="${startDate}">

    <label>结束日期：</label>
    <input type="date" name="endDate" th:value="${endDate}">

    <button type="submit">筛选</button>
    <a th:href="@{/transactions}">重置</a>
</form>

<table border="1" cellspacing="0" cellpadding="8">
    <thead>
    <tr>
        <th>ID</th>
        <th>类型</th>
        <th>金额</th>
        <th>分类</th>
        <th>日期</th>
        <th>备注</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(transactions)}">
        <td colspan="6">暂无数据，请先新增一条记账记录。</td>
    </tr>
    <tr th:each="t : ${transactions}">
        <td th:text="${t.id}"></td>
        <td th:text="${t.type}"></td>
        <td th:text="${t.amount}"></td>
        <td th:text="${categoryNameMap[t.categoryId]}"></td>
        <td th:text="${t.txnDate}"></td>
        <td th:text="${t.note}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
