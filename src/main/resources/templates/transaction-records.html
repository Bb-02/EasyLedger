<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>记账统计 - EasyLedger</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}" href="/css/theme.css">
    <link rel="icon" type="image/png" th:href="@{/images/EasyLedger.png}" href="/images/EasyLedger.png">
    <script>
        (function () {
            var theme = localStorage.getItem("easyledger-theme");
            if (theme === "dark") {
                document.documentElement.setAttribute("data-theme", "dark");
            } else {
                document.documentElement.removeAttribute("data-theme");
            }
        })();
    </script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background: var(--bg);
        }
        .container {
            max-width: 1100px;
            margin: 24px auto;
            padding: 0 16px 24px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .title-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .app-logo {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.18);
        }
        .title {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
        }
        .subtitle {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 13px;
        }
        .actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .actions .action-link {
            text-decoration: none;
            background: var(--action-bg);
            color: var(--action-text);
            padding: 9px 12px;
            border-radius: 10px;
            font-size: 13px;
            display: inline-block;
            border: 1px solid var(--action-border);
        }
        .actions form {
            display: inline-flex;
            gap: 6px;
            align-items: center;
        }
        .actions select {
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text);
            font-size: 13px;
        }
        .actions button {
            border: none;
            background: var(--action-bg);
            color: var(--action-text);
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid var(--action-border);
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 12px;
            margin-bottom: 14px;
        }
        .date-title {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }
        .date-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .subtotal {
            font-size: 13px;
            color: var(--muted);
        }
        .subtotal .income {
            color: var(--success);
            font-weight: 600;
        }
        .subtotal .expense {
            color: var(--danger);
            font-weight: 600;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--table-bg);
        }
        th, td {
            border-bottom: 1px solid var(--border);
            padding: 10px 8px;
            text-align: left;
            font-size: 14px;
            white-space: nowrap;
        }
        th { background: var(--table-head-bg); }
        .expense { color: var(--danger); }
        .empty {
            padding: 24px 12px;
            text-align: center;
            color: var(--muted);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <div class="title-wrap">
                <img class="app-logo" th:src="@{/images/EasyLedger.png}" src="/images/EasyLedger.png" alt="EasyLedger">
                <h1 class="title">记账统计</h1>
            </div>
            <div class="subtitle" th:text="'按' + ${periodLabel} + '查看全部流水记录'">按日期查看全部流水记录</div>
        </div>
        <div class="actions">
            <form th:action="@{/transactions/records}" method="get">
                <select name="period" onchange="this.form.submit()">
                    <option value="day" th:selected="${period == 'day' || period == null}">按天</option>
                    <option value="week" th:selected="${period == 'week'}">按周</option>
                    <option value="month" th:selected="${period == 'month'}">按月</option>
                    <option value="year" th:selected="${period == 'year'}">按年</option>
                </select>
            </form>
            <a class="action-link" th:href="@{/settings}">设置</a>
            <a class="action-link" th:href="@{/transactions}">返回仪表盘</a>
        </div>
    </div>

    <div class="card" th:if="${groupedTransactions == null or #maps.isEmpty(groupedTransactions)}">
        <div class="empty">暂无流水记录，先新增一笔吧。</div>
    </div>

    <div class="card" th:each="entry : ${groupedTransactions}">
        <div class="date-header">
            <h3 class="date-title" th:text="${entry.key}">2026-03-13</h3>
            <div class="subtotal" th:with="summary=${groupSubtotals[entry.key]}">
                小计：
                <span class="income" th:text="'收入 ' + ${summary != null ? summary.income : 0}">收入 0.00</span>
                <span> | </span>
                <span class="expense" th:text="'支出 ' + ${summary != null ? summary.expense : 0}">支出 0.00</span>
            </div>
        </div>
        <table>
            <thead>
            <tr>
                <th>类型</th>
                <th>分类</th>
                <th>金额</th>
                <th>备注</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="t : ${entry.value}">
                <td th:text="${t.type == 'INCOME' ? '收入' : '支出'}">支出</td>
                <td th:text="${categoryNameMap[t.categoryId] ?: '未分类'}">餐饮</td>
                <td th:text="${t.amount}" th:classappend="${t.type == 'EXPENSE' ? 'expense' : ''}">0.00</td>
                <td th:text="${t.note}">-</td>
                <td>
                    <a class="btn-chip btn-chip--edit" th:href="@{'/transactions/' + ${t.id} + '/edit'}">编辑</a>
                    <form th:action="@{'/transactions/' + ${t.id} + '/delete'}" method="post" style="display:inline; margin-left: 8px;">
                        <button type="submit" class="btn-chip btn-chip--delete" onclick="return confirm('确认删除这条记录吗？');">删除</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
